<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Абитуриенты</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
</head>
<body>
<div class="container mt-4">
    Редактирование студента
</div>
<form method="POST" action="/students/{{ student.id }}/edit">
    <input type="text" name="first_name" value="{{ student.first_name or '' }}">
    <input type="text" name="last_name" value="{{ student.last_name or '' }}">
    <label>
    <input
        type="radio"
        name="gender"
        value="мужской"
        {% if student.gender == "мужской" %}
        checked
        {% endif %}
    >
    Мужской
</label>

<label>
    <input
        type="radio"
        name="gender"
        value="женский"
        {% if student.gender == "женский" %}
        checked
        {% endif %}
    >
    Женский
</label>
    <input type="text" name="group_number" value="{{ student.group_number or '' }}">
    <input type="text" name="email" value="{{ student.email or '' }}">
    <input type="number" name="exam_score" value="{{ student.exam_score or '' }}">
    <input type="number" name="birth_year" value="{{ student.birth_year or '' }}">
    <label>
    <input type="checkbox" name="is_local" {% if student.is_local %}checked{% endif %}>
    Местный
    </label>
    <button type="submit">Сохранить</button>
</form>
</body>
</html>
